<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebRTP Grid</title>
    <link rel="stylesheet" href="/index.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="grid" id="grid"></div>
<div class="pagination" id="pagination">
    <span class="page-info" id="page-info">1 / 1</span>
    <button class="page-btn" id="btn-prev"><i data-lucide="chevron-left"></i></button>
    <button class="page-btn" id="btn-next"><i data-lucide="chevron-right"></i></button>
</div>
<script>
    // ── StreamPlayer class ────────────────────────────────────────────────────────
    class StreamPlayer {
        constructor(wsUrl) {
            this.ws = new WebSocket(wsUrl);
            this.ws.binaryType = 'arraybuffer';
            this.canvas = null;
            this.ctx = null;
            this.decoder = null;
            this.frameIndex = 0;
            this.initDone = false;
            this.codec = null;
            this.desc = null;
            this.firstFrame = true;
            this.dropped = 0;
            this._oninfo = null;
            this._paused = false;
            this._hovering = false;
            this._overlay = null;

            this.ws.onmessage = (e) => this.onMessage(e);
        }

        onMessage(e) {
            if (this._paused) return;

            if (!this.initDone) {
                this.initDone = true;
                const parsed = this.parseInit(e.data);
                this.codec = parsed.codec;
                this.desc = parsed.description;
                this.makeDecoder(this.codec, this.desc);
                return;
            }

            if (!this.decoder || this.decoder.state !== 'configured') return;

            const {frameNo, payload, isKey} = this.parseFrag(e.data);
            const ts = (++this.frameIndex) * 100_000;

            try {
                this.decoder.decode(new EncodedVideoChunk({
                    type: isKey ? 'key' : 'delta',
                    timestamp: ts,
                    data: payload
                }));
                if (this.firstFrame && isKey) {
                    this.firstFrame = false;
                    if (this._oninfo) this._oninfo({playing: true, frameNo});
                } else if (this._hovering) {
                    if (this._oninfo) this._oninfo({frameNo});
                }
            } catch (err) {
                this.dropped++;
                if (this.decoder.state !== 'configured') {
                    this.makeDecoder(this.codec, this.desc);
                }
            }
        }

        parseInit(buf) {
            const b = new Uint8Array(buf);
            for (let i = 0; i < b.length - 8; i++) {
                // avcC (H.264)
                if (b[i] === 0x61 && b[i + 1] === 0x76 && b[i + 2] === 0x63 && b[i + 3] === 0x43) {
                    const payStart = i + 4;
                    const boxSize = ((b[i - 4] << 24) | (b[i - 3] << 16) | (b[i - 2] << 8) | b[i - 1]) >>> 0;
                    const payLen = boxSize - 8;
                    const profile = b[payStart + 1].toString(16).padStart(2, '0');
                    const compat = b[payStart + 2].toString(16).padStart(2, '0');
                    const level = b[payStart + 3].toString(16).padStart(2, '0');
                    return {
                        codec: 'avc1.' + profile + compat + level,
                        description: buf.slice(payStart, payStart + payLen)
                    };
                }
                // hvcC (H.265/HEVC)
                if (b[i] === 0x68 && b[i + 1] === 0x76 && b[i + 2] === 0x63 && b[i + 3] === 0x43) {
                    const payStart = i + 4;
                    const boxSize = ((b[i - 4] << 24) | (b[i - 3] << 16) | (b[i - 2] << 8) | b[i - 1]) >>> 0;
                    // Extract HEVC codec string from hvcC
                    const generalProfileSpace = b[payStart];
                    const generalProfile = b[payStart + 1];
                    const generalTierFlag = (b[payStart + 2] >> 7) & 1;
                    const generalProfileCompatibility = ((b[payStart + 2] & 0x7F) << 24) | (b[payStart + 3] << 16) | (b[payStart + 4] << 8) | b[payStart + 5];
                    const generalLevel = b[payStart + 6];
                    const codecStr = `hvc1.${generalProfile}.${generalLevel}.${generalTierFlag === 0 ? 'L' : 'H'}`;
                    return {codec: codecStr, description: buf.slice(payStart, payStart + boxSize - 8)};
                }
                // btrt (bitrate box) - skip
            }
            return {codec: 'avc1.640028', description: null};
        }

        parseFrag(buf) {
            const b = new Uint8Array(buf);
            // first 8 bytes are uint64 frameNo (big-endian)
            const frameNo = Number(new DataView(buf).getBigUint64(0));
            const data = buf.slice(8);

            for (let i = 0; i < b.length - 8 - 8; i++) {
                if (b[i + 4 + 8] === 0x6D && b[i + 5 + 8] === 0x64 && b[i + 6 + 8] === 0x61 && b[i + 7 + 8] === 0x74) {
                    const size = ((b[i + 8] << 24) | (b[i + 1 + 8] << 16) | (b[i + 2 + 8] << 8) | b[i + 3 + 8]) >>> 0;
                    const payload = data.slice(i + 8, i + size);
                    const p = new Uint8Array(payload);
                    let isKey = false, pos = 0;
                    while (pos + 4 < p.length) {
                        const nl = ((p[pos] << 24) | (p[pos + 1] << 16) | (p[pos + 2] << 8) | p[pos + 3]) >>> 0;
                        if (nl === 0 || pos + 4 + nl > p.length) break;
                        const t = p[pos + 4] & 0x1F;
                        if (t === 5 || t === 19) {
                            isKey = true;
                            break;
                        } // 5 = IDR, 19 = IDR NAL
                        if (t === 1) break;
                        pos += 4 + nl;
                    }
                    return {frameNo, payload, isKey};
                }
            }
            return {frameNo, payload: data, isKey: false};
        }

        makeDecoder(codec, description) {
            if (this.decoder && this.decoder.state !== 'closed') {
                try {
                    this.decoder.close();
                } catch (_) {
                }
            }
            this.decoder = new VideoDecoder({
                output: (frame) => {
                    const w = frame.displayWidth, h = frame.displayHeight;
                    if (this.canvas.width !== w || this.canvas.height !== h) {
                        this.canvas.width = w;
                        this.canvas.height = h;
                    }
                    this.ctx.drawImage(frame, 0, 0, w, h);
                    frame.close();
                },
                error: (e) => {
                    this.dropped++;
                },
            });
            const cfg = {codec, optimizeForLatency: true, hardwareAcceleration: 'prefer-hardware'};
            if (description) cfg.description = description;
            this.decoder.configure(cfg);
        }

        render(target) {
            if (target.tagName === 'CANVAS') {
                this.canvas = target;
            } else if (target.tagName === 'VIDEO') {
                this._videoEl = target;
                this.canvas = document.createElement('canvas');
                this._renderLoop();
            } else {
                this.canvas = document.createElement('canvas');
                target.appendChild(this.canvas);
            }
            this.ctx = this.canvas.getContext('2d', {alpha: false});
            return this;
        }

        _renderLoop() {
            if (this._videoEl && this.canvas) {
                this._videoEl.srcObject = this.canvas.captureStream();
            }
        }

        info() {
            return {
                codec: this.codec,
                frames: this.frameIndex,
                dropped: this.dropped,
                paused: this._paused,
            };
        }

        play() {
            this._paused = false;
        }

        pause() {
            this._paused = true;
        }

        onInfo(fn) {
            this._oninfo = fn;
        }

        close() {
            this._paused = true;
            if (this.decoder && this.decoder.state !== 'closed') {
                try {
                    this.decoder.close();
                } catch (_) {
                }
            }
            if (this.ws.readyState === WebSocket.OPEN) {
                this.ws.close();
            }
        }
    }

    function createPlayer(wsUrl) {
        return new StreamPlayer(wsUrl);
    }

    // ── App state ────────────────────────────────────────────────────────────────
    let streams = [];
    let players = {};
    let currentPage = 0;
    const grid = document.getElementById('grid');
    const pagination = document.getElementById('pagination');

    function calcGridCols(streamCount) {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const pixels = w * h;
        const ratio = w / h;

        // Base columns from pixel count
        let cols;
        if (pixels >= 2000000) {
            cols = 4;
        } else if (pixels >= 900000) {
            cols = 3;
        } else if (pixels >= 400000) {
            cols = 2;
        } else {
            cols = 1;
        }

        // Adjust based on aspect ratio (wider = more cols, taller = fewer)
        if (ratio > 1.5) {
            cols = Math.min(cols + 1, 5);
        } else if (ratio < 0.7) {
            cols = Math.max(cols - 1, 1);
        }

        // Limit by actual stream count (square grid)
        const maxCols = Math.ceil(Math.sqrt(streamCount));
        return Math.min(cols, maxCols);
    }

    function getGridSize() {
        const cols = calcGridCols(streams.length);
        return cols * cols;
    }

    async function loadInfo() {
        try {
            const res = await fetch('/info');
            const data = await res.json();
            streams = data.streams || [];
            renderGrid();
        } catch (e) {
            console.error('loadInfo:', e);
        }
    }

    function renderGrid() {
        // Close existing players
        Object.values(players).forEach(p => p.close());
        players = {};

        grid.innerHTML = '';
        const cols = calcGridCols(streams.length);
        const perPage = cols * cols;
        const start = currentPage * perPage;

        grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        grid.style.gridTemplateRows = `repeat(${cols}, 1fr)`;

        for (let i = 0; i < perPage; i++) {
            const idx = start + i;
            const cell = document.createElement('div');
            cell.className = 'cell';

            if (idx < streams.length) {
                const stream = streams[idx];
                cell.dataset.index = idx;

                const canvas = document.createElement('canvas');
                canvas.className = 'cell-canvas';
                cell.appendChild(canvas);

                const overlay = document.createElement('div');
                overlay.className = 'cell-overlay';
                overlay.innerHTML = `<div class="cell-name">${stream.name}</div>
                <div class="cell-meta">
                    <span>${stream.codec || '—'}</span>
                    <span>${stream.width || 0}x${stream.height || 0}</span>
                    <span>${Math.round(stream.framerate || 0)}fps</span>
                    <span class="frame-no">#0</span>
                </div>`;
                cell.appendChild(overlay);

                const wsUrl = `ws://${location.host}/stream/${stream.name}`;
                const player = createPlayer(wsUrl);
                player.render(canvas);
                player._overlay = overlay;
                player.onInfo((info) => {
                    if (info.frameNo !== undefined) {
                        const frameNoSpan = overlay.querySelector('.frame-no');
                        if (frameNoSpan) frameNoSpan.textContent = '#' + info.frameNo;
                    }
                });
                cell.addEventListener('mouseenter', () => { player._hovering = true; });
                cell.addEventListener('mouseleave', () => { player._hovering = false; });
                players[idx] = player;
            } else {
                cell.classList.add('blank');
            }

            grid.appendChild(cell);
        }

        updatePageInfo();
    }

    function updatePageInfo() {
        const size = getGridSize();
        const totalPages = Math.max(1, Math.ceil(streams.length / size));
        document.getElementById('page-info').textContent = `${currentPage + 1} / ${totalPages}`;
        pagination.style.display = streams.length > 0 ? 'flex' : 'none';
        document.getElementById('btn-prev').disabled = currentPage === 0;
        document.getElementById('btn-next').disabled = currentPage >= totalPages - 1;
    }

    function prevPage() {
        const size = getGridSize();
        if (currentPage > 0) {
            currentPage--;
            renderGrid();
        }
    }

    function nextPage() {
        const size = getGridSize();
        const totalPages = Math.max(1, Math.ceil(streams.length / size));
        if (currentPage < totalPages - 1) {
            currentPage++;
            renderGrid();
        }
    }

    // ── Init ─────────────────────────────────────────────────────────────────────
    document.getElementById('btn-prev').addEventListener('click', prevPage);
    document.getElementById('btn-next').addEventListener('click', nextPage);

    let resizeTimeout;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
            currentPage = 0;
            renderGrid();
        }, 200);
    });

    loadInfo();

    lucide.createIcons();
</script>
</body>
</html>
